# SwiftLint Configuration - Plovdiv Transit iOS
# SwiftLint 0.63.2 / Swift 6.2 / iOS 26

excluded:
  - .build
  - DerivedData
  - "*.xcodeproj"
  - Packages/*/Tests
  - Packages/*/.build

# Disable formatting rules handled by SwiftFormat
disabled_rules:
  - trailing_whitespace
  - opening_brace
  - trailing_comma
  - vertical_whitespace

# Enable useful opt-in rules
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - yoda_condition

# Rule configurations
line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b
    - bg
    - en

type_name:
  min_length: 3
  max_length: 50

nesting:
  type_level: 3
  function_level: 3
